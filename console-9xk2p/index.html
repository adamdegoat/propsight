<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PropSight · Members Console</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Schibsted+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--green:#1b3a2d;--green2:#27513f;--brass:#b08d57;--ink:#191512;--ink2:#5a5248;--ink3:#8a8175;--line:#e7e0d2;--bg:#f4f4f6;--panel:#fff}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Schibsted Grotesk",system-ui,sans-serif;color:var(--ink);background:var(--bg);font-size:14px}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  /* gate */
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gatebox{max-width:360px;width:100%;background:#fff;border:1px solid var(--line);border-radius:18px;padding:32px 28px;box-shadow:0 30px 70px rgba(15,35,26,.14);text-align:center}
  .gatebox .mk{font-family:"Fraunces",serif;font-weight:600;font-size:22px;color:var(--green)}
  .gatebox .mk span{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--brass);display:block;margin-top:2px;font-family:"Schibsted Grotesk"}
  .gatebox p{font-size:12.5px;color:var(--ink3);margin:6px 0 20px}
  .gatebox input{width:100%;padding:13px 15px;border:1px solid #d8cfbe;border-radius:11px;font-size:16px;font-family:inherit;text-align:center;letter-spacing:.1em}
  .gatebox input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(31,193,143,.14)}
  .gatebox button{width:100%;margin-top:11px;padding:13px;border:0;border-radius:11px;background:var(--green);color:#f5f1e8;font-size:14.5px;font-weight:700;font-family:inherit;cursor:pointer}
  .gatebox .err{color:#c0392b;font-size:12px;font-weight:600;margin-top:10px;min-height:14px}
  /* app */
  #app{display:none;padding:26px 0 60px}
  header.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  header.top h1{font-family:"Fraunces",serif;font-weight:600;font-size:24px;margin:0;flex:1}
  .kpis{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 20px;min-width:130px}
  .kpi b{display:block;font-family:"Fraunces",serif;font-size:27px;color:var(--green);line-height:1}
  .kpi span{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:700}
  .bar{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
  .btn{padding:9px 15px;border-radius:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .btn:hover{border-color:var(--brass)}
  .btn.dark{background:var(--green);color:#f5f1e8;border-color:var(--green)}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:22px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:12px 16px;font-size:13px;border-bottom:1px solid #f1ece1}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:700;background:#fafaf7}
  td.em{color:var(--ink2)}
  tr:last-child td{border-bottom:0}
  .pill{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px}
  .pill.c{background:#eaf5ef;color:#1b7a52}.pill.p{background:#fbf3e2;color:#9a6b1e}
  .del{color:#c0392b;cursor:pointer;font-weight:600;font-size:12px;background:none;border:0;font-family:inherit}
  .ptitle{font-family:"Fraunces",serif;font-size:17px;padding:16px 18px 0;color:var(--ink)}
  .pform{padding:14px 18px 18px}
  .pform label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin:10px 0 5px}
  .pform input,.pform textarea{width:100%;padding:11px 13px;border:1px solid #d8cfbe;border-radius:10px;font-size:16px;font-family:inherit;resize:vertical}
  .pform textarea{min-height:150px;line-height:1.5}
  .pform input:focus,.pform textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(31,193,143,.12)}
  .sendbar{display:flex;gap:9px;align-items:center;margin-top:13px;flex-wrap:wrap}
  .msg{font-size:13px;font-weight:600}.msg.ok{color:#1b7a52}.msg.err{color:#c0392b}
  .empty{padding:40px;text-align:center;color:var(--ink3)}
  .hint{font-size:11.5px;color:var(--ink3);margin-top:6px}
</style>
</head>
<body>
  <div id="gate">
    <form class="gatebox" id="gform">
      <div class="mk">PropSight<span>Members Console</span></div>
      <p>Private. Enter the access code.</p>
      <input id="pw" type="password" inputmode="text" autocomplete="current-password" placeholder="Access code" autofocus>
      <button type="submit">Enter</button>
      <div class="err" id="gerr"></div>
    </form>
  </div>

  <div id="app">
    <div class="wrap">
      <header class="top">
        <h1>Members</h1>
        <button class="btn" id="refresh">Refresh</button>
        <button class="btn" id="csv">Export CSV</button>
        <button class="btn" id="logout">Lock</button>
      </header>
      <div class="kpis" id="kpis"></div>

      <div class="panel">
        <div class="ptitle">Newsletter</div>
        <div class="pform">
          <label>Subject</label>
          <input id="nsub" placeholder="This week on the Singapore market…">
          <label>Message</label>
          <textarea id="nbody" placeholder="Write in plain text. Blank lines become paragraphs. It’s wrapped in the PropSight email design automatically."></textarea>
          <div class="hint">Sends from propsightsg@gmail.com to confirmed members. Always send a test to yourself first.</div>
          <div class="sendbar">
            <input id="ntest" style="max-width:230px" placeholder="test email" value="evergrow11@gmail.com">
            <button class="btn" id="nsendtest">Send test</button>
            <button class="btn dark" id="nsendall">Send to all confirmed</button>
            <span class="msg" id="nmsg"></span>
          </div>
        </div>
      </div>

      <div class="panel">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Source</th><th>Joined</th><th></th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="empty" id="empty" style="display:none">No members yet.</div>
      </div>
    </div>
  </div>

<script>
var API='https://web-production-07326.up.railway.app';
var KEY='';
function H(){return {'X-PS-Key':KEY,'Content-Type':'application/json'};}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

document.getElementById('gform').addEventListener('submit',function(e){
  e.preventDefault();
  KEY=document.getElementById('pw').value.trim();
  fetch(API+'/api/member-admin/list',{headers:H()}).then(function(r){
    if(r.status===401){document.getElementById('gerr').textContent='Wrong code.';return null;}
    return r.json();
  }).then(function(d){
    if(!d)return;
    sessionStorage.setItem('ps_console_key',KEY);
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    paint(d);
  }).catch(function(){document.getElementById('gerr').textContent='Network error.';});
});

function load(){
  fetch(API+'/api/member-admin/list',{headers:H()}).then(function(r){return r.json();}).then(paint);
}
function paint(d){
  var c=d.count||{total:0,confirmed:0};
  document.getElementById('kpis').innerHTML=
    '<div class="kpi"><b>'+c.total+'</b><span>Members</span></div>'+
    '<div class="kpi"><b>'+c.confirmed+'</b><span>Confirmed</span></div>'+
    '<div class="kpi"><b>'+(c.total-c.confirmed)+'</b><span>Pending</span></div>';
  var m=d.members||[]; window._members=m;
  document.getElementById('empty').style.display=m.length?'none':'block';
  document.getElementById('rows').innerHTML=m.map(function(x){
    var st=x.status==='confirmed'?'<span class="pill c">Confirmed</span>':'<span class="pill p">Pending</span>';
    var dt=(x.created_at||'').slice(0,10);
    return '<tr><td>'+esc(x.name||'—')+'</td><td class="em">'+esc(x.email)+'</td><td>'+st+
      '</td><td class="em">'+esc(x.source||'')+'</td><td class="em">'+dt+
      '</td><td><button class="del" data-e="'+esc(x.email)+'">Delete</button></td></tr>';
  }).join('');
  document.querySelectorAll('.del').forEach(function(b){
    b.onclick=function(){
      if(!confirm('Remove '+b.dataset.e+'?'))return;
      fetch(API+'/api/member-admin/delete',{method:'POST',headers:H(),body:JSON.stringify({email:b.dataset.e})})
        .then(function(r){return r.json();}).then(load);
    };
  });
}
document.getElementById('refresh').onclick=load;
document.getElementById('logout').onclick=function(){sessionStorage.removeItem('ps_console_key');location.reload();};
document.getElementById('csv').onclick=function(){
  var m=window._members||[];
  var rows=[['name','email','status','source','joined','confirmed']].concat(m.map(function(x){
    return [x.name||'',x.email,x.status,x.source||'',x.created_at||'',x.confirmed_at||''];
  }));
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='propsight-members.csv'; a.click();
};

function bodyHtml(){
  var t=document.getElementById('nbody').value.trim();
  return t.split(/\n\s*\n/).map(function(p){
    return '<p style="font-size:14px;color:#5a5248;line-height:1.6;margin:0 0 14px">'+esc(p).replace(/\n/g,'<br>')+'</p>';
  }).join('');
}
function send(testOnly){
  var sub=document.getElementById('nsub').value.trim();
  var msg=document.getElementById('nmsg');
  if(!sub||!document.getElementById('nbody').value.trim()){msg.className='msg err';msg.textContent='Subject and message required.';return;}
  var payload={subject:sub,html:bodyHtml()};
  if(testOnly){payload.test_to=document.getElementById('ntest').value.trim();}
  else if(!confirm('Send to ALL confirmed members?'))return;
  msg.className='msg';msg.textContent='Sending…';
  fetch(API+'/api/member-admin/newsletter',{method:'POST',headers:H(),body:JSON.stringify(payload)})
    .then(function(r){return r.json();}).then(function(d){
      if(d&&d.ok){msg.className='msg ok';msg.textContent=(testOnly?'Test sent':'Sent')+', '+d.sent+'/'+d.total+(d.failed?(' ('+d.failed+' failed)'):'')+'.';}
      else{msg.className='msg err';msg.textContent=(d&&d.error)||'Failed.';}
    }).catch(function(){msg.className='msg err';msg.textContent='Network error.';});
}
document.getElementById('nsendtest').onclick=function(){send(true);};
document.getElementById('nsendall').onclick=function(){send(false);};

// auto-unlock if a key is already in this session
(function(){
  var k=sessionStorage.getItem('ps_console_key');
  if(k){KEY=k;fetch(API+'/api/member-admin/list',{headers:H()}).then(function(r){return r.status===200?r.json():null;}).then(function(d){
    if(d){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';paint(d);}
  });}
})();
</script>
</body>
</html>
