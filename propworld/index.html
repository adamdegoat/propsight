<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --ink:#0c211a; --green:#163a2d; --teal:#0f7a82; --teal2:#2f9a8f; --mint:#7fd0bb;
    --paper:#eef4f0; --card:#fff; --line:#dbe7e1; --sub:#5c7268;
  }
  html,body{height:100%;overflow:hidden;font-family:'Schibsted Grotesk',system-ui,sans-serif;color:var(--ink);background:#cfe1e3;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
  #scene{position:fixed;inset:0;touch-action:none;cursor:grab}
  #scene:active{cursor:grabbing}
  #scene canvas{display:block}

  #chrome{position:fixed;top:0;left:0;right:0;z-index:20;padding:20px 26px;display:flex;align-items:flex-start;justify-content:space-between;gap:18px;pointer-events:none}
  .lt,.rt{pointer-events:auto}
  .lt{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .back{display:none;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);border:1px solid var(--line);color:var(--green);text-decoration:none;flex:none;backdrop-filter:blur(7px);box-shadow:0 5px 16px -7px rgba(20,50,40,.45)}
  .back:hover{background:#fff}
  .back svg{width:21px;height:21px}
  .lt .brand{display:flex;flex-direction:column}
  .mark{display:inline-block;text-decoration:none;font-size:clamp(26px,3.4vw,38px);font-weight:800;letter-spacing:-.038em;line-height:.96;color:var(--green)}
  .mark span{color:var(--teal)}
  .tag{margin-top:8px;font-size:14px;font-weight:500;color:#3f544b;max-width:360px;line-height:1.42}
  .rt{display:flex;align-items:center;gap:9px}
  .chip{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--green);backdrop-filter:blur(7px)}
  .chip.clock b{font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .chip .sgt{color:var(--sub);font-weight:600}
  .live i{width:8px;height:8px;border-radius:50%;background:#16a34a;animation:ping 2.4s ease-out infinite}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}70%{box-shadow:0 0 0 7px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
  .btn{border:1px solid var(--line);background:rgba(255,255,255,.86);border-radius:999px;padding:7px 12px;font:inherit;font-size:13px;font-weight:700;color:var(--green);cursor:pointer;backdrop-filter:blur(7px)}
  .btn:hover{background:#fff}

  #hint{position:fixed;left:0;right:0;bottom:80px;text-align:center;z-index:15;pointer-events:none;transition:opacity .6s ease}
  #hint.gone{opacity:0}
  #hint span{display:inline-block;max-width:calc(100vw - 28px);text-align:center;line-height:1.3;font-size:12.5px;font-weight:600;color:var(--green);background:rgba(255,255,255,.8);padding:8px 16px;border-radius:18px;backdrop-filter:blur(7px);border:1px solid var(--line)}

  #err{position:fixed;left:16px;top:80px;z-index:50;color:#a33;font:12px/1.4 monospace;white-space:pre-wrap}

  /* ---- place pins ---- */
  #pins{position:fixed;inset:0;z-index:14;pointer-events:none;overflow:hidden}
  #pins.hide{opacity:0;pointer-events:none;transition:opacity .25s}
  .pin{position:absolute;transform:translate(-50%,-100%);pointer-events:auto;cursor:pointer;border:none;background:none;font:inherit;display:flex;flex-direction:column;align-items:center;will-change:transform;transition:opacity .2s}
  .pin[hidden]{display:none}
  .pin .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:999px;padding:3.5px 10px 3.5px 8px;font-size:11.5px;font-weight:700;color:var(--green);box-shadow:0 6px 16px -9px rgba(20,50,40,.5);white-space:nowrap}
  .pin .tag i{width:7px;height:7px;border-radius:50%;background:var(--pc);box-shadow:0 0 0 2.5px color-mix(in srgb,var(--pc) 24%,transparent)}
  .pin .stem{width:2px;height:13px;background:linear-gradient(var(--pc),rgba(20,50,40,0))}
  .pin .dot{width:8px;height:8px;border-radius:50%;background:var(--pc);border:2px solid #fff;box-shadow:0 2px 6px rgba(20,50,40,.45)}
  .pin:hover .tag{background:#fff;transform:translateY(-1px)}
  .pin.mini .tag,.pin.mini .stem{display:none}

  /* ---- places control + menu ---- */
  #places{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:22}
  .pbtn{border:1px solid var(--line);background:rgba(255,255,255,.92);border-radius:999px;padding:11px 18px;font:inherit;font-size:13.5px;font-weight:800;color:var(--green);cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 8px 24px -12px rgba(20,50,40,.55);display:inline-flex;align-items:center;gap:8px}
  .pbtn:hover{background:#fff}
  .pbtn svg{width:16px;height:16px}
  #placesMenu{position:fixed;left:50%;bottom:74px;transform:translateX(-50%) translateY(8px);z-index:23;width:min(360px,92vw);max-height:64vh;overflow-y:auto;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 26px 64px -22px rgba(20,50,40,.5);padding:8px;opacity:0;visibility:hidden;transition:opacity .22s,transform .22s}
  #placesMenu.open{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  #placesMenu .mh{font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:800;color:var(--sub);padding:8px 12px 6px}
  .pitem{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:none;background:none;font:inherit;padding:11px 12px;border-radius:13px;cursor:pointer;color:var(--ink)}
  .pitem:hover{background:var(--paper)}
  .pitem .sw{width:11px;height:11px;border-radius:50%;flex:none;background:var(--pc)}
  .pitem .tx b{font-size:14px;font-weight:700;display:block;line-height:1.2}
  .pitem .tx span{font-size:12px;color:var(--sub)}

  /* ---- panel ---- */
  #backdrop{position:fixed;inset:0;z-index:28;background:rgba(12,33,26,.30);opacity:0;visibility:hidden;transition:opacity .3s}
  #backdrop.open{opacity:1;visibility:visible}
  #panel{position:fixed;top:0;right:0;height:100%;width:392px;max-width:88vw;background:var(--card);z-index:30;box-shadow:-20px 0 54px -22px rgba(20,50,40,.42);transform:translateX(104%);transition:transform .42s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;padding:66px 32px 32px;overflow-y:auto}
  #panel.open{transform:none}
  #pclose{position:absolute;top:20px;right:20px;width:38px;height:38px;border:none;border-radius:50%;background:var(--paper);color:var(--sub);font-size:21px;line-height:1;cursor:pointer}
  #pclose:hover{background:#e3eee8}
  #pkick{font-size:11px;text-transform:uppercase;letter-spacing:.14em;font-weight:800;color:var(--pc);margin-bottom:9px}
  #ptitle{font-size:28px;font-weight:800;letter-spacing:-.022em;line-height:1.08;margin-bottom:16px;color:var(--green)}
  #pfeat{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
  .pfeat{display:flex;gap:11px;align-items:flex-start;font-size:13.5px;line-height:1.42;color:#3f544b}
  .pfeat i{width:7px;height:7px;border-radius:50%;background:var(--pc);margin-top:6px;flex:none}
  #pblurb{font-size:14.5px;line-height:1.62;color:#3f544b;margin-bottom:24px}
  #pcta{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;border-radius:999px;padding:13px 24px;font-size:14px;font-weight:800;text-decoration:none;align-self:flex-start}
  #pcta:hover{background:#0f2c22}
  #pcta svg{width:15px;height:15px}
  #psoon{display:none;align-items:center;gap:8px;align-self:flex-start;background:var(--paper);color:var(--sub);border:1px solid var(--line);border-radius:999px;padding:12px 22px;font-size:13.5px;font-weight:800}
  #psoon i{width:8px;height:8px;border-radius:50%;background:var(--pc,#0f7a82)}
  #paudio{display:none;align-items:center;gap:13px;align-self:stretch;background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:12px 14px;margin-bottom:20px}
  #paBtn{flex:none;width:46px;height:46px;border-radius:50%;border:none;background:var(--pc,#0f7a82);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #paBtn:hover{filter:brightness(1.06)}
  #paBtn svg{width:20px;height:20px}
  .pa-tx{display:flex;flex-direction:column;line-height:1.28;min-width:0}
  .pa-tx b{font-size:14px;font-weight:800;color:var(--green)}
  .pa-tx span{font-size:12px;color:var(--sub)}

  /* ---- Aillie chat panel ---- */
  #chat{position:fixed;top:0;right:0;height:100%;width:392px;max-width:88vw;background:var(--card);z-index:31;box-shadow:-20px 0 54px -22px rgba(20,50,40,.42);transform:translateX(104%);transition:transform .42s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column}
  #chat.open{transform:none}
  #chat .ch{display:flex;align-items:center;gap:11px;padding:16px;border-bottom:1px solid var(--line)}
  #chat .cav{width:40px;height:40px;border-radius:50%;flex:none;background:radial-gradient(circle at 38% 32%,#a6e2d0,#2f9a8f)}
  #chat .cnm{display:flex;flex-direction:column;line-height:1.16}
  #chat .cnm b{font-size:16px;font-weight:800;color:var(--green)}
  #chat .cnm span{font-size:11.5px;color:var(--sub);font-weight:600;display:flex;align-items:center;gap:6px}
  #chat .cnm span i{width:7px;height:7px;border-radius:50%;background:#16a34a}
  #chat .cx{margin-left:auto;width:34px;height:34px;border-radius:50%;border:none;background:var(--paper);cursor:pointer;color:var(--sub);font-size:19px;line-height:1}
  #chat .cx:hover{background:#e3eee8}
  #chat .cmsgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:9px;background:var(--paper)}
  #chat .amsg{max-width:82%;padding:9px 13px;border-radius:15px;font-size:13.7px;line-height:1.44;white-space:pre-wrap;word-wrap:break-word}
  #chat .amsg.a{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px;color:var(--ink)}
  #chat .amsg.u{align-self:flex-end;background:var(--teal);color:#fff;border-bottom-right-radius:5px}
  #chat .amsg.load{color:var(--sub);font-style:italic}
  #chat .abtn{align-self:flex-start;display:inline-flex;align-items:center;gap:6px;margin-top:-2px;background:var(--green);color:#fff;font-weight:800;font-size:13px;text-decoration:none;padding:9px 13px;border-radius:11px}
  #chat .abtn:hover{background:#0f2c22}
  #chat .cchips{display:flex;flex-wrap:wrap;gap:7px;padding:10px 13px 4px;background:var(--paper)}
  #chat .cchips.hide{display:none}
  #chat .cchips button{background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px 12px;font:inherit;font-size:12px;font-weight:700;color:var(--teal);cursor:pointer}
  #chat .cchips button:hover{background:#eef4f1}
  #chat .cin{display:flex;gap:8px;padding:11px;border-top:1px solid var(--line);background:var(--card)}
  #chat .cin input{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font:inherit;font-size:16px;outline:none;min-width:0;color:var(--ink)}
  #chat .cin input:focus{border-color:var(--teal2)}
  #chat .cin button{flex:none;width:46px;border:none;border-radius:11px;background:var(--green);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #chat .cin button:disabled{opacity:.5}
  #chat .cin button svg{width:18px;height:18px}

  @media (max-width:620px){
    #chrome{padding:14px 14px} .tag{display:none} .rt{gap:6px}
    .back{display:inline-flex}
    .mark{font-size:24px}
    .chip{padding:6px 10px;font-size:11.5px}
    .live{display:none}
    #hint{bottom:74px}
    #panel{width:100%;max-width:100%;top:auto;bottom:0;height:auto;max-height:86vh;border-radius:24px 24px 0 0;transform:translateY(104%);padding:42px 22px 28px}
    #panel.open{transform:none}
    #chat{width:100%;max-width:100%;top:auto;bottom:0;height:84vh;border-radius:24px 24px 0 0;transform:translateY(104%)}
    #chat.open{transform:none}
    #places{bottom:18px} #placesMenu{bottom:70px}
    .pin.far{opacity:0}
  }
</style>

<body>
  <div id="scene"></div>

<script type="module">
import * as THREE from "three";
import { mergeGeometries } from "three/addons/utils/BufferGeometryUtils.js";

/* =========================================================================
   PropWorld - floating paper Singapore (hero / P1, revision 3)
   Buildings + trees baked into merged geometry (reliable, 1 draw call each).
   ========================================================================= */
function paintColor(geo, hex){
  const c = new THREE.Color(hex), n = geo.attributes.position.count, a = new Float32Array(n*3);
  for(let i=0;i<n;i++){ a[i*3]=c.r; a[i*3+1]=c.g; a[i*3+2]=c.b; }
  geo.setAttribute("color", new THREE.BufferAttribute(a,3)); return geo;
}

const PAL = {
  land:  "#c5d9ac", edge:"#c3ad82", edgeLo:"#a88f63",
  water: "#4fbdd4", waterD:"#3fbcd0",
  park:  ["#8fb673","#7ea867","#a0c483"],
  hdb:   ["#eee1c6","#e8c39b","#e0a877","#ecd3a2","#ddc7a4","#eee1c6",
          "#8fb6aa","#a4c1cf","#a8bd8d","#e0a58c","#cf9f9a","#b4c2c1","#c1b3c6"],  // mixed muted estate colours
  condo: ["#cfe6e6","#bcdcdc","#dbeeee"],
  cbd:   ["#e6eef0","#d7e6e8","#eef4f4","#c9dede"],
  glass: "#a9d3d6", roof:"#b06a4a",
  sky:   { top:"#a3cbd9", mid:"#dbeee9", low:"#f7f0e0" },
};

let renderer, scene, camera, host, island, clouds, LKEY, LHEMI, LAMB, CLOUD_MAT, MBS_MAT;
const TOD = {   // always bright - daytime, warming to golden in the evening. Never dark.
  day:    {top:"#a3cbd9",mid:"#dbeee9",low:"#f7f0e0", fog:"#dbeee9", key:0xfff0cf,keyI:1.72,hemiI:0.72,ambI:0.13, bg:"#cfe1e3", cloud:0xffffff,cloudO:0.82},
  golden: {top:"#93b4d8",mid:"#eecfa0",low:"#ffe6bc", fog:"#f0dab4", key:0xffdca2,keyI:1.64,hemiI:0.60,ambI:0.14, bg:"#ead8b8", cloud:0xfff0da,cloudO:0.8},
};
function currentTOD(){
  const q=new URLSearchParams(location.search).get("tod"); if(q&&TOD[q]) return TOD[q];
  const sg=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Singapore"}));
  const h=sg.getHours()+sg.getMinutes()/60;
  return (h>=7 && h<17) ? TOD.day : TOD.golden;      // bright day, warm-golden evening - no night
}
function applyTOD(){ if(!scene) return; const t=currentTOD();
  PAL.sky.top=t.top; PAL.sky.mid=t.mid; PAL.sky.low=t.low;
  scene.background=makeSky(); scene.fog.color.set(t.fog);
  LKEY.color.set(t.key); LKEY.intensity=t.keyI; LHEMI.intensity=t.hemiI; LAMB.intensity=t.ambI;
  if(CLOUD_MAT){ CLOUD_MAT.color.setHex(t.cloud); CLOUD_MAT.opacity=t.cloudO; }
  document.body.style.background=t.bg; needsRender=true;
}
const orbit = { theta:0.16, phi:1.14, r:1000, tr:1000 };   // hero: south, low, across Marina Bay to the skyline
const lim = { phiMin:0.52, phiMax:1.40, rMin:440, rMax:3200 };
let dragging=false,lastX=0,lastY=0,moved=0,vT=0,vP=0,idleT=0,needsRender=true,tPrev=0;
let phiEase=false, phiTgt=1.14;
// as you zoom out the camera gently lifts toward a top-down overview (whole island); zoom in drops to the hero
function phiForZoom(r){ const t=(r-lim.rMin)/(lim.rMax-lim.rMin); return THREE.MathUtils.clamp(1.24 - t*0.66, lim.phiMin, lim.phiMax); }
function zoomTo(r){ orbit.tr=THREE.MathUtils.clamp(r,lim.rMin,lim.rMax); phiTgt=phiForZoom(orbit.tr); phiEase=true; needsRender=true; }

/* ---------- Singapore outline (local: x east+, y north+) ---------- */
const SG = [
  [-500,30],[-455,-55],[-355,-120],[-235,-175],[-95,-206],[-15,-208],
  [70,-200],[160,-206],[260,-206],[368,-168],[475,-70],[455,20],
  [340,92],[225,140],[110,108],[10,140],[-130,128],[-270,92],[-400,55],
];
let MINX=1e9,MAXX=-1e9,MINY=1e9,MAXY=-1e9;
SG.forEach(([x,y])=>{ MINX=Math.min(MINX,x);MAXX=Math.max(MAXX,x);MINY=Math.min(MINY,y);MAXY=Math.max(MAXY,y); });
const PADX=60,PADY=60; MINX-=PADX;MAXX+=PADX;MINY-=PADY;MAXY+=PADY;
const SPANX=MAXX-MINX, SPANY=MAXY-MINY;

/* ---------- painted top-surface map (green land, parks, water, urban tint, roads) ---------- */
function landMap(){
  const S=1536, c=document.createElement("canvas"); c.width=c.height=S; const g=c.getContext("2d");
  const L2C=(x,y)=>[ (x-MINX)/SPANX*S, (1-(y-MINY)/SPANY)*S ];
  const R=(rx)=> rx/SPANX*S, RY=(ry)=> ry/SPANY*S;
  const rnd=(s=>()=>{s=Math.sin(s*99.1)*4390.7;return s-Math.floor(s);})(3);
  // island path (for clip + beach)
  const sgPath=new Path2D(); SG.forEach(([x,y],i)=>{const[cx,cy]=L2C(x,y); i?sgPath.lineTo(cx,cy):sgPath.moveTo(cx,cy);}); sgPath.closePath();

  g.fillStyle=PAL.land; g.fillRect(0,0,S,S);
  g.save(); g.clip(sgPath);                              // keep all detail on the island
  // soft mottle
  for(let i=0;i<1600;i++){ g.fillStyle=`rgba(${118+rnd()*34|0},${150+rnd()*30|0},${92+rnd()*30|0},0.05)`;
    g.beginPath();g.arc(rnd()*S,rnd()*S,4+rnd()*18,0,7);g.fill(); }
  // parks + nature reserves (layered green)
  PARKS.forEach(p=>{ const[cx,cy]=L2C(p.c[0],p.c[1]); const grd=g.createRadialGradient(cx,cy,4,cx,cy,R(p.rx));
    grd.addColorStop(0,PAL.park[p.col]);grd.addColorStop(.68,PAL.park[p.col]);grd.addColorStop(1,"rgba(140,180,110,0)");
    g.fillStyle=grd;g.beginPath();g.ellipse(cx,cy,R(p.rx),RY(p.ry),0,0,7);g.fill(); });
  // darker forest speckle inside the big reserves
  [[-100,58,150,90],[120,88,120,70]].forEach(([x,y,rx,ry])=>{ for(let i=0;i<260;i++){
    const a=rnd()*7, rr=Math.sqrt(rnd()); const px=x+Math.cos(a)*rx*rr, py=y+Math.sin(a)*ry*rr; const[cx,cy]=L2C(px,py);
    g.fillStyle=`rgba(70,110,72,${0.10+rnd()*0.14})`; g.beginPath();g.arc(cx,cy,2+rnd()*6,0,7);g.fill(); }});
  // urban warm tint over built-up areas
  [[-52,-150,150],[300,-10,160],[150,40,120],[-250,-10,120]].forEach(([x,y,rr])=>{ const[cx,cy]=L2C(x,y);
    const grd=g.createRadialGradient(cx,cy,4,cx,cy,R(rr));grd.addColorStop(0,"rgba(222,192,150,0.34)");grd.addColorStop(1,"rgba(222,192,150,0)");
    g.fillStyle=grd;g.beginPath();g.arc(cx,cy,R(rr),0,7);g.fill(); });
  // ---- roads: a few sweeping expressways + a light local grid ----
  const road=(pts,w,col)=>{ g.strokeStyle=col; g.lineWidth=w; g.lineJoin="round"; g.lineCap="round";
    g.beginPath(); pts.forEach((p,i)=>{const[cx,cy]=L2C(p[0],p[1]); i?g.lineTo(cx,cy):g.moveTo(cx,cy);}); g.stroke(); };
  const EXP="rgba(236,232,222,0.7)", EXPc="rgba(150,150,132,0.5)";
  const exps=[
    [[-470,10],[-300,-40],[-120,-60],[60,-40],[240,-60],[430,-40]],   // PIE-ish spine
    [[-40,-190],[-30,-120],[-10,-20],[10,90],[0,150]],                // N-S (CTE-ish)
    [[-330,-60],[-180,20],[-20,60],[160,50],[320,-20]],               // cross
    [[430,-40],[300,-90],[180,-150],[40,-175]],                       // ECP-ish to bay
  ];
  exps.forEach(p=>{ road(p,R(9),EXPc); road(p,R(6),EXP); });
  // fine local grid (clipped, faint)
  g.strokeStyle="rgba(120,126,100,0.13)"; g.lineWidth=1.2;
  for(let i=0;i<70;i++){ g.beginPath(); const y=rnd()*S; g.moveTo(0,y); g.lineTo(S,y+(rnd()-.5)*90); g.stroke();
    g.beginPath(); const x=rnd()*S; g.moveTo(x,0); g.lineTo(x+(rnd()-.5)*90,S); g.stroke(); }
  // ---- beach: sandy rim just inside the coastline ----
  g.lineJoin="round"; g.strokeStyle="rgba(228,214,176,0.9)"; g.lineWidth=R(20); g.stroke(sgPath);
  g.strokeStyle="rgba(214,196,150,0.5)"; g.lineWidth=R(9); g.stroke(sgPath);
  // ---- water: reservoirs + Marina Bay ----
  WATER.forEach(p=>{ const[cx,cy]=L2C(p.c[0],p.c[1]);
    g.fillStyle=PAL.waterD; g.beginPath();g.ellipse(cx,cy,R(p.rx),RY(p.ry),p.rot,0,7);g.fill();
    g.strokeStyle="rgba(255,255,255,.4)"; g.lineWidth=R(2.4); g.beginPath();g.ellipse(cx,cy,R(p.rx)*.96,RY(p.ry)*.96,p.rot,0,7);g.stroke();
    g.fillStyle="rgba(255,255,255,.16)";g.beginPath();g.ellipse(cx-R(p.rx)*.22,cy-RY(p.ry)*.28,R(p.rx)*.48,RY(p.ry)*.38,p.rot,0,7);g.fill(); });
  g.restore();
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace; t.anisotropy=4; return t;
}

/* ---------- island: slab (thickness) + painted top ---------- */
function buildIsland(g){
  const shape=new THREE.Shape(); SG.forEach(([x,y],i)=> i?shape.lineTo(x,y):shape.moveTo(x,y)); shape.closePath();
  // thickness slab
  const eg=new THREE.ExtrudeGeometry(shape,{depth:52,bevelEnabled:true,bevelThickness:7,bevelSize:8,bevelSegments:2,steps:1});
  eg.rotateX(-Math.PI/2); eg.translate(0,-51.2,0);   // top cap at y=0.8 (where buildings & trees sit)
  // paint the land map straight onto the slab's TOP cap (bbox-normalised UVs) - one surface, no z-fighting
  { const nor=eg.attributes.normal, pos=eg.attributes.position, uv=eg.attributes.uv;
    for(let i=0;i<pos.count;i++){ if(nor.getY(i)>0.4){
      uv.setXY(i, (pos.getX(i)-MINX)/SPANX, (-pos.getZ(i)-MINY)/SPANY); } }
    uv.needsUpdate=true; }
  const slab=new THREE.Mesh(eg,[
    new THREE.MeshStandardMaterial({map:landMap(),roughness:.96,metalness:0}),   // top cap = painted land + water
    mat(PAL.edge,{rep:2}) ]);                                                     // sides = paper-cut earth edge
  slab.receiveShadow=true; g.add(slab);
}
function blobGeo(rx,ry,rot,seg=40){ const s=new THREE.Shape();
  for(let i=0;i<=seg;i++){const a=(i/seg)*Math.PI*2;const x=Math.cos(a)*rx,y=Math.sin(a)*ry; i?s.lineTo(x,y):s.moveTo(x,y);}
  const g=new THREE.ShapeGeometry(s);g.rotateX(-Math.PI/2);return g; }

function rng(seed){let s=seed;return()=>{s=Math.sin(s*127.1+311.7)*43758.5;return s-Math.floor(s);};}

/* ---------- facade: one clean window per cell, tiled by UV ---------- */
function facadeTex(){
  const C=32, c=document.createElement("canvas");c.width=c.height=C;const g=c.getContext("2d");
  g.fillStyle="#fff";g.fillRect(0,0,C,C);                         // wall (keeps building tint)
  g.fillStyle="rgba(104,120,132,0.26)";g.fillRect(6,5,20,22);     // one window, subtle (low contrast)
  g.strokeStyle="rgba(255,255,255,0.42)";g.lineWidth=1.5;g.strokeRect(6,5,20,22);
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.colorSpace=THREE.SRGBColorSpace;
  t.anisotropy=4; return t;
}
const ROOF_DARK="#5b5346";
// clean window grid; walls take the building tint, flat roof/ledge faces go dark (no bright caps)
function facadeBox(w,h,d,tint){
  const geo=new THREE.BoxGeometry(w,h,d); geo.translate(0,h/2,0);
  const nor=geo.attributes.normal, uv=geo.attributes.uv, n=geo.attributes.position.count;
  const floors=Math.max(1,Math.round(h/6.2)), colsW=Math.max(1,Math.round(w/6.2)), colsD=Math.max(1,Math.round(d/6.2));
  const cW=new THREE.Color(tint), cR=new THREE.Color(ROOF_DARK), ca=new Float32Array(n*3);
  for(let i=0;i<n;i++){ const ny=nor.getY(i); let c;
    if(Math.abs(ny)>0.5){ uv.setXY(i,0.02,0.02); c=cR; }          // roof/floor -> wall texel + dark colour
    else { const cols=Math.abs(nor.getX(i))>0.5?colsD:colsW; uv.setXY(i, uv.getX(i)*cols, uv.getY(i)*floors); c=cW; }
    ca[i*3]=c.r; ca[i*3+1]=c.g; ca[i*3+2]=c.b; }
  uv.needsUpdate=true; geo.setAttribute("color", new THREE.BufferAttribute(ca,3)); return geo;
}

function addBuildings(g){
  const all=[];
  CLUSTERS.forEach((cl,ci)=>{ const rand=rng(ci*97+5);
    for(let i=0;i<cl.n;i++){ const a=rand()*Math.PI*2, rr=Math.pow(rand(),.8)*cl.r;
      const x=cl.c[0]+Math.cos(a)*rr, yN=cl.c[1]+Math.sin(a)*rr*0.82;
      if(!inSG(x,yN) || inWater(x,yN,1.25)) continue;
      if(POIS.some(p=>{const dx=x-p.x,dy=yN-p.yN;return dx*dx+dy*dy < (p.clr||40)*(p.clr||40);})) continue;  // keep landmark plots clear

// a smooth slim tower that leans gently toward the centre - one MBS tower
function mbsTower(w,d,h,leanX){
  const g=new THREE.BoxGeometry(w,h,d,1,12,1); g.translate(0,h/2,0);
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++){ const t=THREE.MathUtils.clamp(p.getY(i)/h,0,1);
    p.setX(i, p.getX(i)*(1-0.06*t) + leanX*t);            // very slight taper + tiny lean
    p.setZ(i, p.getZ(i)*(1-0.05*t)); }
  p.needsUpdate=true; g.computeVertexNormals(); return g;
}

  tour.ph=THREE.MathUtils.clamp(p.y>150?1.04:1.14,lim.phiMin,lim.phiMax);
  tour.r=1180; tour.poi=p; tour.on=true; phiEase=false; needsRender=true; }

function applyCamera(){ orbit.phi=THREE.MathUtils.clamp(orbit.phi,lim.phiMin,lim.phiMax); orbit.r+=(orbit.tr-orbit.r)*0.12;
  const r=orbit.r; camera.position.set(r*Math.sin(orbit.phi)*Math.sin(orbit.theta),r*Math.cos(orbit.phi),r*Math.sin(orbit.phi)*Math.cos(orbit.theta));
  camera.lookAt(0,66,54); }   // aim above the bay so the skyline has clear sky headroom

function bindControls(){
  // one unified pointer system: 1 finger = rotate, 2 fingers = pinch-zoom ONLY (no rotation jitter)
  const pts=new Map(); let pinchD=0, pinching=false;
  const dist=()=>{ const p=[...pts.values()]; return Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); };
  const down=(e)=>{ if(paused)return; try{host.setPointerCapture(e.pointerId);}catch(_){}
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY}); tour.on=false; closeMenu(); needsRender=true;
    if(pts.size>=2){ dragging=false; pinching=true; pinchD=dist(); vT=vP=0; }               // second finger down -> enter pinch, stop rotating
    else { dragging=true; moved=0; lastX=e.clientX; lastY=e.clientY; vT=vP=0; idleT=0; phiEase=false; } };
  const move=(e)=>{ if(!pts.has(e.pointerId))return; pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pinching){ if(pts.size<2)return; const d=dist(); if(pinchD)zoomTo(orbit.tr+(pinchD-d)*2.2); pinchD=d; needsRender=true; return; }
    if(!dragging)return; const dx=e.clientX-lastX,dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; moved+=Math.abs(dx)+Math.abs(dy);
    vT=-dx*0.005; vP=-dy*0.005; orbit.theta+=vT; orbit.phi+=vP; idleT=0; needsRender=true; document.getElementById("hint")?.classList.add("gone"); };
  const up=(e)=>{ pts.delete(e.pointerId);
    if(pts.size<2){ pinching=false; pinchD=0; }
    if(pts.size===1){ const p=[...pts.values()][0]; lastX=p.x; lastY=p.y; dragging=true; vT=vP=0; }  // lift 1 of 2 fingers: resume drag from the other, no jump
    else if(pts.size===0){ dragging=false; } };
  host.addEventListener("pointerdown",down);
  host.addEventListener("pointermove",move);
  host.addEventListener("pointerup",up); host.addEventListener("pointercancel",up);
  host.addEventListener("wheel",e=>{if(paused)return;e.preventDefault();zoomTo(orbit.tr+e.deltaY*0.8);},{passive:false});
}
function onResize(){ camera.aspect=innerWidth/innerHeight; const portrait=innerWidth/innerHeight<0.85;
  camera.fov=portrait?48:40;
  orbit.tr=orbit.r=THREE.MathUtils.clamp(portrait?1040:1000, lim.rMin, lim.rMax);
  camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); needsRender=true; }

function loop(t){ requestAnimationFrame(loop); if(document.hidden)return;
  // frozen world: render ONLY while the user is interacting (drag / inertia / zoom) or on a state change.
  let moving=false;
  if(!dragging&&(Math.abs(vT)>1e-4||Math.abs(vP)>1e-4)){orbit.theta+=vT;orbit.phi+=vP;vT*=0.9;vP*=0.9;moving=true;}
  if(tour.on&&!dragging){ orbit.theta+=wrapAngle(tour.th-orbit.theta)*0.12; orbit.phi+=(tour.ph-orbit.phi)*0.12; orbit.tr+=(tour.r-orbit.tr)*0.12;
    if(Math.abs(wrapAngle(tour.th-orbit.theta))<0.012 && Math.abs(tour.ph-orbit.phi)<0.012 && Math.abs(tour.r-orbit.tr)<10){ tour.on=false; openFor(tour.poi); } moving=true; }
  if(phiEase&&!dragging){ orbit.phi+=(phiTgt-orbit.phi)*0.12; if(Math.abs(phiTgt-orbit.phi)<0.002){orbit.phi=phiTgt;phiEase=false;} moving=true; }
  if(Math.abs(orbit.tr-orbit.r)>0.5)moving=true;
  if(moving||needsRender){ applyCamera(); renderer.render(scene,camera); updatePins(); needsRender=false; }
}

  const tag=document.querySelector(".tag"); if(tag) tag.textContent=T("tag");
  const today=document.querySelector(".chip.live span"); if(today) today.textContent=T("today");
  const pl=document.getElementById("placesLbl"); if(pl) pl.textContent=T("places");
  const soon=document.getElementById("psoon"); if(soon) soon.innerHTML=`<i></i>${T("soon")}`;
  const cstat=document.querySelector("#chat .cnm span"); if(cstat) cstat.innerHTML=`<i></i>${T("aStatus")}`;
  const cin=document.getElementById("chatInput"); if(cin) cin.placeholder=T("aPh");
  const touch=('ontouchstart' in window)||navigator.maxTouchPoints>0, hs=document.querySelector("#hint span");
  if(hs) hs.textContent = touch ? T("hintTouch") : T("hintDesk");
  const lb=document.getElementById("lang");
  if(lb){ lb.textContent = zh?"EN":"中文";
    lb.addEventListener("click",()=>{ try{ localStorage.setItem("ps_lang", zh?"en":"zh"); }catch(e){} location.reload(); }); }
}
applyLang();

try{ init(); }catch(e){ document.getElementById("err").textContent="Error: "+(e.message||e); console.error(e); }
</script>
</body>
</html>
