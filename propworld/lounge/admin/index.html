<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lounge moderation · PropSight</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23163a2d'/%3E%3Ccircle cx='16' cy='12' r='5' fill='%23f4b46a'/%3E%3Crect x='6' y='19' width='20' height='3' rx='1.5' fill='%237fd0bb'/%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --ink:#20140c; --green:#1b3a2d; --teal:#0f7a82; --mint:#7fd0bb;
    --sun:#f6b45f; --coral:#d9713f;
    --buyer:#0f7a82; --seller:#cf6a3c; --agent:#2c7a52;
    --panel:#fbf4ea; --line:#e6d9c6; --sub:#7c6a58; --bg:#eef3ee;
  }
  html,body{height:100%}
  body{font-family:'Schibsted Grotesk',system-ui,sans-serif;color:var(--ink);background:
      radial-gradient(1200px 600px at 80% -10%, #dfeee6 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #e7ecdf 0%, transparent 55%), var(--bg);
    -webkit-font-smoothing:antialiased;min-height:100%}

  /* gate */
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gcard{width:min(400px,94vw);background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px 24px;box-shadow:0 30px 70px -30px rgba(20,15,8,.4)}
  .badge{width:44px;height:44px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .badge svg{width:24px;height:24px}
  .gcard h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .gcard p{font-size:13.5px;color:var(--sub);margin:7px 0 18px;line-height:1.5}
  label.f{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.11em;color:var(--sub);margin-bottom:8px}
  input[type=password]{width:100%;font:inherit;font-size:16px;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fcfaf6;outline:none}
  input[type=password]:focus{border-color:var(--teal)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font:inherit;font-weight:700;font-size:15px;border:none;border-radius:12px;padding:13px 18px;cursor:pointer;transition:transform .1s,opacity .15s}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--green);color:#fff;width:100%;margin-top:14px}
  .btn[disabled]{opacity:.55;cursor:default}
  .err{font-size:13px;font-weight:600;color:var(--coral);min-height:18px;margin-top:10px;text-align:center}

  /* console */
  #app{display:none;max-width:760px;margin:0 auto;padding:22px 16px 60px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .top .badge{margin:0}
  .top h1{font-size:19px;font-weight:800;letter-spacing:-.01em;line-height:1}
  .top h1 small{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-top:3px}
  .spacer{margin-left:auto}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--green);font-size:13.5px;padding:10px 14px}
  .btn.danger{background:#fff;border:1.5px solid #eab9a6;color:var(--coral);font-size:13.5px;padding:10px 14px}
  .btn.danger:hover{background:#fdf3ee}

  .count{font-size:12.5px;font-weight:700;color:var(--sub);margin:0 0 12px 2px}
  .list{display:flex;flex-direction:column;gap:9px}
  .row{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 13px}
  .row.host{background:#fdf6ea;border-color:#f0e2c6}
  .av{width:34px;height:34px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
  .bd{flex:1;min-width:0}
  .meta{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
  .nm{font-weight:800;font-size:13.5px}
  .tag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#fff;padding:2px 7px;border-radius:999px}
  .tm{font-size:11px;color:var(--sub);font-weight:600}
  .tx{font-size:14px;line-height:1.45;word-wrap:break-word;overflow-wrap:anywhere}
  .del{flex:none;background:#fff;border:1.5px solid var(--line);color:var(--sub);border-radius:9px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .12s,color .12s}
  .del:hover{border-color:#eab9a6;color:var(--coral)}
  .del svg{width:16px;height:16px}
  .empty{text-align:center;color:var(--sub);font-size:14px;padding:40px 0}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--green);color:#fff;font-size:13px;font-weight:600;padding:10px 16px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s;box-shadow:0 14px 30px -12px rgba(20,20,10,.6)}
  .toast.on{opacity:1}
</style>
</head>
<body>

<section id="gate">
  <form class="gcard" id="gform">
    <div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="#f6b45f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V8a5 5 0 0 1 10 0v3"/></svg></div>
    <h1>Lounge moderation</h1>
    <p>Enter your moderator key to review and remove messages from the SkyPark Lounge. This page is private and unlisted.</p>
    <label class="f" for="key">Moderator key</label>
    <input id="key" type="password" autocomplete="current-password" placeholder="Paste your key" />
    <button class="btn primary" id="go" type="submit">Unlock console</button>
    <div class="err" id="gerr"></div>
  </form>
</section>

<main id="app">
  <div class="top">
    <div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="#f6b45f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></div>
    <h1>SkyPark Lounge<small>Moderation console</small></h1>
    <div class="spacer"></div>
    <button class="btn ghost" id="refresh" type="button">Refresh</button>
    <button class="btn danger" id="clear" type="button">Clear all</button>
    <button class="btn ghost" id="out" type="button">Sign out</button>
  </div>
  <div class="count" id="count">Loading messages...</div>
  <div class="list" id="list"></div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL = "https://cxbalckxmogzafkctoqe.supabase.co";
const SB_KEY = "sb_publishable_-qG1wMvvs6xgkG7LS3eitA_4mxs5dYg";
const sb = createClient(SB_URL, SB_KEY);
const $ = id => document.getElementById(id);
const ROLE_C = { buyer:"var(--buyer)", seller:"var(--seller)", agent:"var(--agent)" };
let KEY = null;

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function initials(n){ return (n.trim()[0]||"?").toUpperCase(); }
function timeSG(iso){ const d=new Date(iso); return d.toLocaleString("en-SG",{timeZone:"Asia/Singapore",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",hour12:true}); }
let tt; function toast(t){ $("toast").textContent=t; $("toast").classList.add("on"); clearTimeout(tt); tt=setTimeout(()=>$("toast").classList.remove("on"),2200); }

/* the moderator key doubles as the passcode. it is never stored in this page,
   only kept in the browser after a successful server-side check. */
async function validate(key){
  const { data, error } = await sb.rpc("lounge_delete", { p_id: -1, p_token: key });
  if(error) throw error;
  return data === true;   // true only when the token matches; id -1 deletes nothing
}

$("gform").addEventListener("submit", async e=>{
  e.preventDefault();
  const key = $("key").value.trim();
  if(!key) return;
  $("go").disabled=true; $("gerr").textContent="";
  try{
    if(await validate(key)){ KEY=key; localStorage.setItem("skypark_admin",key); openConsole(); }
    else $("gerr").textContent="That key was not accepted.";
  }catch(err){ $("gerr").textContent="Could not reach the lounge. Try again."; }
  $("go").disabled=false;
});

function rowHTML(m){
  const host = m.name==="PropSight";
  const rc = ROLE_C[m.role]||"var(--agent)";
  const tag = host ? `<span class="tag" style="background:var(--sun)">Host</span>` : `<span class="tag" style="background:${rc}">${m.role}</span>`;
  return `<div class="row${host?' host':''}" data-id="${m.id}">
    <div class="av" style="background:${host?'var(--sun)':rc}">${host?'&#9733;':initials(m.name)}</div>
    <div class="bd"><div class="meta"><span class="nm">${esc(m.name)}</span>${tag}<span class="tm">${timeSG(m.created_at)}</span></div>
    <div class="tx">${esc(m.body)}</div></div>
    <button class="del" title="Delete" data-id="${m.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg></button>
  </div>`;
}

function render(rows){
  const list=$("list");
  if(!rows.length){ list.innerHTML=`<div class="empty">The lounge is empty right now.</div>`; }
  else list.innerHTML = rows.map(rowHTML).join("");
  $("count").textContent = `${rows.length} message${rows.length===1?"":"s"} in the room`;
}

async function load(){
  const { data, error } = await sb.from("lounge_messages").select("*").order("id",{ascending:false}).limit(200);
  if(error){ $("count").textContent="Could not load messages."; return; }
  render(data||[]);
}

let chan=null;
function openConsole(){
  $("gate").style.display="none"; $("app").style.display="block";
  load();
  if(chan) sb.removeChannel(chan);
  chan = sb.channel("lounge-admin").on("postgres_changes",{event:"*",schema:"public",table:"lounge_messages"},()=>load());
  chan.subscribe();
}

/* delete via delegation */
$("list").addEventListener("click", async e=>{
  const btn = e.target.closest(".del"); if(!btn) return;
  const id = Number(btn.dataset.id);
  btn.disabled=true;
  const { data, error } = await sb.rpc("lounge_delete", { p_id:id, p_token:KEY });
  if(!error && data===true){ const r=$("list").querySelector(`.row[data-id="${id}"]`); if(r) r.remove(); toast("Message removed"); load(); }
  else { btn.disabled=false; toast("Could not remove that"); }
});

$("clear").addEventListener("click", async ()=>{
  if(!confirm("Remove every message in the lounge? This cannot be undone.")) return;
  const { data, error } = await sb.rpc("lounge_clear", { p_token:KEY });
  if(!error && data===true){ toast("Lounge cleared"); load(); }
  else toast("Could not clear the room");
});

$("refresh").addEventListener("click", load);
$("out").addEventListener("click", ()=>{ localStorage.removeItem("skypark_admin"); location.reload(); });

/* returning moderator: re-check the stored key against the server before trusting it */
(async ()=>{
  const saved = localStorage.getItem("skypark_admin");
  if(saved){ try{ if(await validate(saved)){ KEY=saved; openConsole(); } else localStorage.removeItem("skypark_admin"); }catch{} }
})();
</script>
</body>
</html>
