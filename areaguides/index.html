function card(t){return '<a class="acard" href="'+esc(t.slug)+'.html"><div class="ph" style="background-image:url(img/'+esc(t.slug)+'/hero.jpg)"><span class="rg">'+esc(t.region)+'</span><span class="nm">'+esc(t.name)+'</span></div><div class="bd"><div class="hook">'+esc(t.hook)+'</div>'+(t.stat?'<span class="stat">'+esc(t.stat)+'</span>':'')+'</div></a>';}
function render(){
