<!doctype html><html lang="en"><head>
<meta charset="utf8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Confirming your email · PropSight</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231b3a2d'/%3E%3Cg fill='none' stroke='%23cfeae0' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='13.5' cy='13.5' r='9.5'/%3E%3Cpath d='M8.75 16 L13.5 11 L18.25 16'/%3E%3Cpath d='M10.5 18.2 L16.5 18.2'/%3E%3C/g%3E%3Ccircle cx='13.5' cy='16.5' r='1' fill='%2315a0a0'/%3E%3Cpath d='M20.25 20.25 L26.5 26.5' fill='none' stroke='%2315a0a0' stroke-width='2.8' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f231a,#27513f);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#eaf6f1;padding:24px}
  .card{max-width:440px;text-align:center}
  .mk{width:56px;height:56px;border-radius:15px;background:rgba(255,255,255,.1);display:inline-flex;align-items:center;justify-content:center;color:#84e6d4;margin-bottom:22px}
  .mk svg{width:32px;height:32px}
  h1{font-family:Georgia,serif;font-weight:600;font-size:27px;margin-bottom:12px}
  p{font-size:15px;color:rgba(234,246,241,.8);line-height:1.6}
  .sp{margin:26px auto 0;width:34px;height:34px;border:3px solid rgba(255,255,255,.18);border-top-color:#84e6d4;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#84e6d4;font-weight:700}
  .fb{margin-top:22px;font-size:13px;color:rgba(234,246,241,.6);display:none}
</style>
<script>
(function(){
  var t=(new URLSearchParams(location.search).get('t')||'').trim();
  var API='https://web-production-07326.up.railway.app/api/member/confirm?t=';
  if(t && /^[A-Za-z0-9_.\-]{8,}$/.test(t)){
    location.replace(API+encodeURIComponent(t));
  } else {
    document.addEventListener('DOMContentLoaded',function(){
      var f=document.querySelector('.fb'); if(f) f.style.display='block';
      var s=document.querySelector('.sp'); if(s) s.style.display='none';
    });
  }
})();
</script></head>
<body><div class="card">
  <div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="7"/><path d="M16 16l5 5"/><path d="M7.5 11.5l3-3 3 3"/><path d="M9 11v3h3v-3"/></svg></div>
  <h1>Confirming your email</h1>
  <p>One moment while we unlock your PropSight membership.</p>
  <div class="sp"></div>
  <p class="fb">This link looks incomplete. <a href="https://propsight.sg/">Go to PropSight</a> and sign in with your email instead.</p>
</div></body></html>
