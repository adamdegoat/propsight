<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Schibsted+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#191512;--ink2:#5a5248;--ink3:#8a8175;--bg:#f4f1e8;--green:#1b3a2d;--green2:#27513f;--brass:#b08d57;--brass3:#e3c98f;--serif:'Fraunces',Georgia,serif}
html,body{width:1200px;height:630px;overflow:hidden}
body{font-family:'Schibsted Grotesk',system-ui,sans-serif;background:var(--bg);position:relative;color:var(--ink)}
.bg{position:absolute;inset:0;background:radial-gradient(900px 520px at 88% -10%,rgba(227,201,143,.34),transparent 60%),radial-gradient(700px 600px at -8% 120%,rgba(39,81,63,.10),transparent 60%)}
.frame{position:absolute;inset:34px;border:1px solid rgba(176,141,87,.35);border-radius:26px}
.wrap{position:absolute;inset:0;padding:78px 84px;display:flex;flex-direction:column;justify-content:space-between}
.brand{display:flex;align-items:center;gap:15px}
.brand .pm{width:54px;height:54px;color:var(--green)}
.brand b{font-family:var(--serif);font-weight:600;font-size:34px;letter-spacing:.01em;color:#191512}
.brand span{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--ink3);font-weight:700;display:block;margin-top:3px}
.mid{max-width:880px}
.eyebrow{display:inline-flex;align-items:center;gap:11px;font-size:14px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--brass)}
.eyebrow::before{content:"";width:30px;height:2px;background:var(--brass)}
h1{font-family:var(--serif);font-weight:600;font-size:72px;line-height:1.02;letter-spacing:-.02em;margin:22px 0 0;color:#171310}
.sub{font-size:25px;line-height:1.4;color:var(--ink2);margin:24px 0 0;max-width:760px}
.foot{display:flex;align-items:center;gap:18px}
.foot .url{font-size:21px;font-weight:800;color:var(--green2)}
.foot .dot{width:5px;height:5px;border-radius:50%;background:var(--brass)}
.foot .tags{font-size:18px;font-weight:600;color:var(--ink3)}
.foot .free{margin-left:auto;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#241a0d;background:linear-gradient(135deg,var(--brass3),var(--brass));padding:9px 18px;border-radius:30px}
</style></head>
<body>
<div class="bg"></div>
<div class="frame"></div>
<div class="wrap">
  <div class="brand">
    <svg class="pm" viewBox="0 0 64 64"><path d="M9 35 L32 13 L55 35" fill="none" stroke="currentColor" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 49 L48 49" stroke="currentColor" stroke-width="4.4" stroke-linecap="round"/><circle cx="32" cy="39" r="3.6" fill="#b08d57"/></svg>
    <div><b>PropSight</b><span>Singapore</span></div>
  </div>
  <div class="mid">
    <span class="eyebrow">Singapore property, clear</span>
    <h1>See what any home<br>is really worth.</h1>
    <p class="sub">Every HDB and condo, valued on real recent sales. Check what you can afford, research any project, and ask Aillie anything.</p>
  </div>
  <div class="foot">
    <span class="url">propsight.sg</span>
    <span class="dot"></span><span class="tags">Value · Research · Aillie</span>
    <span class="free">Free, no sign-up</span>
  </div>
</div>
</body></html>
